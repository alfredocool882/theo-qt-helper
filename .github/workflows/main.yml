name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.0"
          host: linux
          target: desktop
          arch: gcc_64
          modules: qtsvg qthelp
          cache: true
      - name: Build
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"
          cmake --build build
          test -x release/TheoQtHelper

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.0"
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtsvg qthelp
          cache: true
      - name: Install Ninja
        run: choco install ninja -y
      - name: Build
        shell: pwsh
        run: |
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            "-DCMAKE_PREFIX_PATH=$env:QT_ROOT_DIR"
          cmake --build build
          if (-not (Test-Path release\TheoQtHelper.exe)) { exit 1 }

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.0"
          host: mac
          target: desktop
          arch: clang_64
          modules: qtsvg qthelp
          cache: true
      - name: Build
        run: |
          brew install ninja cmake
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"
          cmake --build build
          test -x release/TheoQtHelper.app/Contents/MacOS/TheoQtHelper || test -x release/TheoQtHelper
